<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Get in touch with Richard Lin for collaborations, internships, or project inquiries">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Richard Lin - Contact">
    <meta property="og:title" content="Richard Lin - ECE Student & Temple STEPS Scholar">
    <meta property="og:description" content="Get in touch with Richard Lin for collaborations, internships, or project inquiries">
    <meta property="og:image" content="https://richardlin05.github.io/images/richardlin.jpg">
    <meta property="og:url" content="https://richardlin05.github.io/pages/contact.html">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <title>Richard Lin - Contact</title>
</head>
<body>
    <div id="navbar"></div>
    <header>
        <h1 class="contact-header" data-key="contact-header"></h1>
    </header>
    <main class="contact-main">
        <div class="contact-grid">
            <div class="contact-card">
                <i class="fas fa-envelope" aria-hidden="true"></i>
                <p class="label" data-key="email"></p>
                <p class="value">richlin3452@gmail.com</p>
                <a class="action-btn" href="mailto:richlin3452@gmail.com" data-key="send-email" title="Send an email to Richard Lin"></a>
            </div>

            <div class="contact-card">
                <i class="fas fa-phone" aria-hidden="true"></i>
                <p class="label" data-key="phone-number"></p>
                <p class="value">+1 215-403-4999</p>
                <a class="action-btn" href="tel:+12154034999" data-key="call-text" title="Call or text Richard Lin"></a>
            </div>

            <div class="contact-card">
                <div class="icon-circle wechat-circle">
                    <i class="fa-brands fa-weixin" aria-hidden="true"></i>
                </div>
                <p class="label" data-key="wechat"></p>
                <p class="value">rich3452</p>
                <img src="/images/wechat.jpg" alt="WeChat QR code" class="qrcode" title="Scan QR to add on WeChat">
            </div>

            <div class="contact-card">
                <div class="icon-circle line-circle">
                    <i class="fa-brands fa-line" aria-hidden="true"></i>
                </div>
                <p class="label" data-key="line"></p>
                <p class="value">rich3452</p>
                <img src="/images/line.jpg" alt="Line QR code" class="qrcode" title="Scan QR to add on Line">
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="/js/scripts.js"></script>
</body>
</html>
